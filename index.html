<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gerador de Chamados</title>
<style>
body{margin:0;font-family:Arial;background:#0d0d0d;color:#fff}
.container{max-width:1000px;margin:24px auto;background:#1a1a1a;padding:20px;border-radius:12px;box-shadow:0 0 20px rgba(255,102,0,.25)}
h1{text-align:center;color:#ff6600}
.section{background:#141414;border-left:5px solid #ff6600;padding:12px;margin-bottom:12px;border-radius:6px}
.section h2{margin:0 0 10px;color:#ff6600}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.full{grid-column:1/-1}
@media(max-width:700px){.grid{grid-template-columns:1fr}}
label{display:block;font-weight:bold;margin:6px 0 3px}
input,select,textarea{width:100%;box-sizing:border-box;padding:10px;background:#fff;color:#000;border:2px solid #444;border-radius:6px}
textarea{min-height:80px}
button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:6px;font-weight:bold;cursor:pointer}
.btn-gerar{background:#ff6600;color:#fff}.btn-copiar{background:#27ae60;color:#fff}.btn-limpar{background:#c0392b;color:#fff}
#resultado{min-height:220px}
</style>
</head>
<body>
<div class="container">
<h1>GERADOR DE CHAMADOS</h1>

<div class="section"><h2>🆔 IDENTIFICAÇÃO DO CHAMADO</h2>
<div class="grid"><div class="full"><label>Chamado BySeven</label><input id="byseven"></div></div></div>

<div class="section"><h2>📌 DADOS DO CLIENTE</h2>
<div class="grid">
<div><label>Razão Social</label><input id="razao"></div>
<div><label>CNPJ</label><input id="cnpj"></div>
<div class="full"><label>Endereço</label><input id="endereco"></div>
</div></div>

<div class="section"><h2>🌐 DADOS DO CIRCUITO</h2>
<div class="grid">
<div class="full"><label>Alerta</label><textarea id="alerta"></textarea></div>
<div><label>Operadora</label><input id="operadora"></div>
<div><label>Telefone da Operadora</label><input id="telefone"></div>
<div><label>Circuito</label><input id="circuito"></div>
<div><label>Tipo de Ocorrência</label>
<select id="ocorrencia">
<option>Link indisponível</option>
<option>Link com perda de pacote</option>
<option>Problemas no cabeamento</option>
</select></div>
<div><label>Equipamento Energizado</label><select id="energia"><option>Sim</option><option>Não</option></select></div>
<div><label>LOS</label><select id="los"><option>N/A</option><option>Acesa</option><option>Piscando</option><option>Desligada</option></select></div>
<div><label>Data</label><input id="data"></div>
<div><label>Hora</label><input id="hora"></div>
</div></div>

<div class="section"><h2>👤 ATENDIMENTO</h2>
<div class="grid">
<div><label>Atendente</label><input id="atendente"></div>
<div><label>Protocolo</label><input id="protocolo"></div>
<div class="full"><label>SLA</label><input id="sla"></div>
</div></div>

<div class="section"><button class="btn-gerar" onclick="gerar()">GERAR CHAMADO</button><button class="btn-copiar" onclick="copiar()">COPIAR DADOS</button><button class="btn-limpar" onclick="limpar()">LIMPAR CAMPOS</button></div>

<div class="section"><h2>📄 RESULTADO GERADO</h2><textarea id="resultado" readonly></textarea></div>
</div>
<script>
function gerar(){
resultado.value=`Solicito a abertura de chamado de reparo para ${ocorrencia.value}.

IDENTIFICAÇÃO DO CHAMADO
Chamado BySeven: ${byseven.value}

DADOS DO CLIENTE
Razão Social: ${razao.value}
CNPJ: ${cnpj.value}
Endereço: ${endereco.value}

DADOS DO CIRCUITO
Operadora: ${operadora.value}
Telefone da Operadora: ${telefone.value}
Circuito: ${circuito.value}
Tipo de Ocorrência: ${ocorrencia.value}
Equipamento Energizado: ${energia.value}
LOS: ${los.value}
Alerta: ${alerta.value}
Data: ${data.value}
Hora: ${hora.value}

ATENDIMENTO
Atendente: ${atendente.value}
Protocolo: ${protocolo.value}
SLA: ${sla.value}`;
}
function copiar(){navigator.clipboard.writeText(resultado.value);alert("Dados copiados com sucesso!");}
function limpar(){document.querySelectorAll("input,textarea").forEach(e=>e.value="");document.querySelectorAll("select").forEach(s=>s.selectedIndex=0);resultado.value="";}
window.onload=()=>{const a=new Date();data.value=`${String(a.getDate()).padStart(2,"0")}/${String(a.getMonth()+1).padStart(2,"0")}/${a.getFullYear()}`;hora.value=`${String(a.getHours()).padStart(2,"0")}:${String(a.getMinutes()).padStart(2,"0")}`;}
</script>
</body></html>
